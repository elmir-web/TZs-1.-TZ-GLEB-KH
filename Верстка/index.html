<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=100, initial-scale=1.0" />
    <title>Component</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="component">
        <h1 class="title">Make a reservation</h1>
        <form class="form-control">
          <input type="text" class="form_select-guest" value="2 guests" />
          <div class="guest-control">
            <button class="btn-minus"></button>
            <button class="btn-plus"></button>
          </div>
          <select class="form_select-date">
            <option>Jan 14, 2021</option>
            <option>Jan 15, 2021</option>
          </select>
          <select class="form_select-time">
            <option>08:30 PM</option>
            <option>09:30 PM</option>
          </select>
          <button class="btn-submit">Reserve now</button>
        </form>
      </div>
    </div>
  </body>
</html>
